project_name: flagger

builds:
  - skip: true

release:
  prerelease: auto

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source_code"

sboms:
  - id: source
    artifacts: source
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - '--bundle=${signature}'
      - '${artifact}'
    artifacts: checksum
    output: true
